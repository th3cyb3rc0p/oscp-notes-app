name: Release

# Triggers on any tag matching v* (e.g. v1.1, v2.0).
# Builds the macOS .app via PyInstaller, packages it as a zip, and
# attaches the zip to the GitHub Release.

on:
 push:
 tags:
 - "v*"

permissions:
 contents: write # needed for softprops/action-gh-release to upload assets

jobs:
 build-macos:
 name: Build macOS .app
 runs-on: macos-14 # Apple Silicon runner
 timeout-minutes: 30

 steps:
 - name: Checkout
 uses: actions/checkout@v4

 - name: Set up Python 3.14
 uses: actions/setup-python@v5
 with:
 python-version: "3.14"

 - name: Install Tk runtime
 run: |
 brew install python-tk@3.14 || true

 - name: Install dependencies
 run: |
 python -m pip install --upgrade pip
 pip install -r requirements.txt
 pip install pyinstaller

 - name: Build with PyInstaller
 run: |
 rm -rf build dist
 pyinstaller --noconfirm --clean OSCP-Notes.spec

 - name: Verify bundle
 run: |
 ls -la dist/
 test -d dist/OSCP-Notes.app || (echo "OSCP-Notes.app not produced" && exit 1)
 file dist/OSCP-Notes.app/Contents/MacOS/OSCP-Notes

 - name: Zip the .app
 run: |
 # Capture arch from the binary for the zip filename
 ARCH=$(file dist/OSCP-Notes.app/Contents/MacOS/OSCP-Notes | grep -oE 'arm64|x86_64' | head -1)
 if [ -z "$ARCH" ]; then
 echo "Could not determine arch"
 exit 1
 fi
 cd dist
 zip -r "../OSCP-Notes-${GITHUB_REF_NAME}-macOS-${ARCH}.zip" OSCP-Notes.app
 cd ..
 ls -la OSCP-Notes-*.zip

 - name: Upload to release
 uses: softprops/action-gh-release@v2
 with:
 files: "*.zip"
 generate_release_notes: true
 fail_on_unmatched_files: true