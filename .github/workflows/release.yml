name: Release
on:
  push:
    tags:
      - v*
permissions:
  contents: write
jobs:
  build-macos:
    name: Build macOS .app
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Tk runtime
        run: brew install python-tk@3.14 || true
      - name: Install dependencies
        run: "python -m pip install --upgrade pip\npip install -r requirements.txt\npip install pyinstaller"
      - name: Build with PyInstaller
        run: "rm -rf build dist\npyinstaller --noconfirm --clean OSCP-Notes.spec"
      - name: Verify bundle
        run: "ls -la dist/\ntest -d dist/OSCP-Notes.app || (echo \"OSCP-Notes.app not produced\" && exit
          1)\nfile dist/OSCP-Notes.app/Contents/MacOS/OSCP-Notes"
      - name: Zip the .app
        run: "ARCH=$(file dist/OSCP-Notes.app/Contents/MacOS/OSCP-Notes | grep -oE 'arm64|x86_64' | head
          -1)\nif [ -z \"$ARCH\" ]; then\n echo \"Could not determine arch\"\n exit 1\nfi\ncd dist\nzip
          -r \"../OSCP-Notes-${GITHUB_REF_NAME}-macOS-${ARCH}.zip\" OSCP-Notes.app\ncd ..\nls -la OSCP-Notes-*.zip"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
          fail_on_unmatched_files: true
